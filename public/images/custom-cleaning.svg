<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="customGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F06292;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGrad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#customGrad)" width="800" height="600"/>
  
  <!-- Clipboard -->
  <rect fill="#fff" opacity="0.95" x="250" y="150" width="300" height="350" rx="15"/>
  <rect fill="#2C3E50" opacity="0.9" x="350" y="130" width="100" height="40" rx="10"/>
  <circle fill="#4CAF50" opacity="0.8" cx="400" cy="150" r="15"/>
  
  <!-- Checklist items -->
  <g opacity="0.9">
    <!-- Item 1 -->
    <rect fill="#4CAF50" x="280" y="200" width="30" height="30" rx="5"/>
    <path fill="#fff" d="M285,210 L292,217 L305,204" stroke="#fff" stroke-width="3"/>
    <rect fill="#E3F2FD" x="320" y="200" width="200" height="30" rx="5"/>
    
    <!-- Item 2 -->
    <rect fill="#4CAF50" x="280" y="250" width="30" height="30" rx="5"/>
    <path fill="#fff" d="M285,260 L292,267 L305,254" stroke="#fff" stroke-width="3"/>
    <rect fill="#E3F2FD" x="320" y="250" width="200" height="30" rx="5"/>
    
    <!-- Item 3 -->
    <rect fill="#E3F2FD" x="280" y="300" width="30" height="30" rx="5"/>
    <rect fill="#E3F2FD" x="320" y="300" width="200" height="30" rx="5"/>
    
    <!-- Item 4 -->
    <rect fill="#4CAF50" x="280" y="350" width="30" height="30" rx="5"/>
    <path fill="#fff" d="M285,360 L292,367 L305,354" stroke="#fff" stroke-width="3"/>
    <rect fill="#E3F2FD" x="320" y="350" width="200" height="30" rx="5"/>
    
    <!-- Item 5 -->
    <rect fill="#E3F2FD" x="280" y="400" width="30" height="30" rx="5"/>
    <rect fill="#E3F2FD" x="320" y="400" width="200" height="30" rx="5"/>
  </g>
  
  <!-- Pen -->
  <rect fill="#2196F3" opacity="0.9" x="480" y="420" width="15" height="80" rx="3" transform="rotate(-45 487.5 460)"/>
  <path fill="#1976D2" opacity="0.9" d="M470,470 L475,475 L480,470 Z" transform="rotate(-45 475 472.5)"/>
  
  <!-- Stars for customization -->
  <circle fill="#FFD700" cx="600" cy="200" r="12" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="180" cy="300" r="10" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="620" cy="400" r="11" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Overlay gradient -->
  <rect fill="url(#overlayGrad8)" width="800" height="600"/>
</svg>
