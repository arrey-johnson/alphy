<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#houseGrad)" width="800" height="600"/>
  
  <!-- House -->
  <path fill="#fff" opacity="0.9" d="M200,300 L400,150 L600,300 L600,500 L200,500 Z"/>
  <path fill="#4CAF50" opacity="0.8" d="M150,300 L400,100 L650,300 L600,300 L400,150 L200,300 Z"/>
  
  <!-- Windows -->
  <rect fill="#87CEEB" opacity="0.7" x="250" y="320" width="80" height="80" rx="5"/>
  <rect fill="#87CEEB" opacity="0.7" x="470" y="320" width="80" height="80" rx="5"/>
  
  <!-- Door -->
  <rect fill="#8B4513" opacity="0.8" x="360" y="380" width="80" height="120" rx="5"/>
  <circle fill="#FFD700" cx="420" cy="440" r="5"/>
  
  <!-- Sparkles -->
  <circle fill="#FFD700" cx="300" cy="250" r="8" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="500" cy="280" r="6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="350" cy="200" r="7" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Overlay gradient -->
  <rect fill="url(#overlayGrad)" width="800" height="600"/>
</svg>
