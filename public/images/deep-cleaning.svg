<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="deepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#deepGrad)" width="800" height="600"/>
  
  <!-- Spray bottle -->
  <rect fill="#fff" opacity="0.9" x="300" y="200" width="80" height="180" rx="10"/>
  <rect fill="#4A90E2" opacity="0.8" x="310" y="210" width="60" height="100" rx="5"/>
  <path fill="#fff" opacity="0.9" d="M330,180 L350,180 L350,200 L330,200 Z"/>
  <path fill="#FFD700" opacity="0.9" d="M340,160 L360,180 L340,180 Z"/>
  
  <!-- Sponge -->
  <rect fill="#FFD700" opacity="0.9" x="420" y="280" width="100" height="60" rx="10"/>
  <rect fill="#FFA726" opacity="0.8" x="420" y="280" width="100" height="20" rx="5"/>
  
  <!-- Bubbles -->
  <circle fill="#fff" opacity="0.7" cx="250" cy="250" r="20"/>
  <circle fill="#fff" opacity="0.6" cx="280" cy="220" r="15"/>
  <circle fill="#fff" opacity="0.8" cx="230" cy="290" r="18"/>
  <circle fill="#fff" opacity="0.7" cx="550" cy="240" r="22"/>
  <circle fill="#fff" opacity="0.6" cx="580" cy="280" r="16"/>
  <circle fill="#fff" opacity="0.8" cx="520" cy="200" r="19"/>
  
  <!-- Sparkles -->
  <circle fill="#FFD700" cx="350" cy="150" r="10" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="10;12;10" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="450" cy="180" r="8" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="300" cy="350" r="9" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Overlay gradient -->
  <rect fill="url(#overlayGrad3)" width="800" height="600"/>
</svg>
