<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="officeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#officeGrad)" width="800" height="600"/>
  
  <!-- Building -->
  <rect fill="#34495E" opacity="0.9" x="150" y="100" width="500" height="400" rx="10"/>
  
  <!-- Windows grid -->
  <g opacity="0.8">
    <rect fill="#87CEEB" x="180" y="140" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="260" y="140" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="340" y="140" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="420" y="140" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="500" y="140" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="580" y="140" width="60" height="60" rx="3"/>
    
    <rect fill="#87CEEB" x="180" y="220" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="260" y="220" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="340" y="220" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="420" y="220" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="500" y="220" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="580" y="220" width="60" height="60" rx="3"/>
    
    <rect fill="#87CEEB" x="180" y="300" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="260" y="300" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="340" y="300" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="420" y="300" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="500" y="300" width="60" height="60" rx="3"/>
    <rect fill="#87CEEB" x="580" y="300" width="60" height="60" rx="3"/>
  </g>
  
  <!-- Entrance -->
  <rect fill="#2C3E50" x="320" y="400" width="160" height="100" rx="5"/>
  
  <!-- Sparkles -->
  <circle fill="#FFD700" cx="250" cy="180" r="8" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="550" cy="250" r="6" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Overlay gradient -->
  <rect fill="url(#overlayGrad2)" width="800" height="600"/>
</svg>
