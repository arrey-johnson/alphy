<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="upholsteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#upholsteryGrad)" width="800" height="600"/>
  
  <!-- Sofa -->
  <rect fill="#8D6E63" opacity="0.9" x="200" y="300" width="400" height="150" rx="15"/>
  <rect fill="#A1887F" opacity="0.8" x="200" y="280" width="400" height="40" rx="15"/>
  
  <!-- Sofa arms -->
  <rect fill="#8D6E63" opacity="0.9" x="180" y="280" width="60" height="120" rx="10"/>
  <rect fill="#8D6E63" opacity="0.9" x="560" y="280" width="60" height="120" rx="10"/>
  
  <!-- Cushions -->
  <rect fill="#BCAAA4" opacity="0.8" x="240" y="290" width="100" height="80" rx="10"/>
  <rect fill="#BCAAA4" opacity="0.8" x="360" y="290" width="100" height="80" rx="10"/>
  <rect fill="#BCAAA4" opacity="0.8" x="480" y="290" width="100" height="80" rx="10"/>
  
  <!-- Sofa legs -->
  <rect fill="#5D4037" opacity="0.9" x="220" y="450" width="20" height="40" rx="3"/>
  <rect fill="#5D4037" opacity="0.9" x="560" y="450" width="20" height="40" rx="3"/>
  
  <!-- Cleaning brush -->
  <rect fill="#2196F3" opacity="0.9" x="350" y="200" width="100" height="30" rx="5"/>
  <rect fill="#1976D2" opacity="0.8" x="350" y="230" width="100" height="20" rx="3"/>
  
  <!-- Sparkles and shine -->
  <circle fill="#FFD700" cx="300" cy="320" r="10" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="10;12;10" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="450" cy="340" r="8" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="520" cy="310" r="9" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Bubbles -->
  <circle fill="#fff" opacity="0.6" cx="280" cy="250" r="15"/>
  <circle fill="#fff" opacity="0.5" cx="310" cy="230" r="12"/>
  <circle fill="#fff" opacity="0.7" cx="500" cy="240" r="14"/>
  
  <!-- Overlay gradient -->
  <rect fill="url(#overlayGrad6)" width="800" height="600"/>
</svg>
