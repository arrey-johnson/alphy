<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="affordGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle fill="url(#affordGrad)" opacity="0.2" cx="100" cy="100" r="90"/>
  <circle fill="url(#affordGrad)" cx="100" cy="100" r="60"/>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#fff" text-anchor="middle">£</text>
  <circle fill="none" stroke="#FFD700" stroke-width="4" cx="100" cy="100" r="70">
    <animate attributeName="stroke-dasharray" values="0 440;440 0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
