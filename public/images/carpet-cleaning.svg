<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="carpetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BA68C8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6" />
    </linearGradient>
    <pattern id="carpetPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect fill="#8E24AA" width="40" height="40"/>
      <circle fill="#AB47BC" cx="20" cy="20" r="3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#carpetGrad)" width="800" height="600"/>
  
  <!-- Carpet -->
  <rect fill="url(#carpetPattern)" opacity="0.9" x="150" y="300" width="500" height="200" rx="10"/>
  <rect fill="#7B1FA2" opacity="0.3" x="150" y="300" width="500" height="30" rx="10"/>
  
  <!-- Vacuum cleaner -->
  <ellipse fill="#2C3E50" opacity="0.9" cx="400" cy="250" rx="60" ry="40"/>
  <rect fill="#34495E" opacity="0.9" x="380" y="210" width="40" height="40" rx="5"/>
  <path fill="#95A5A6" opacity="0.9" d="M400,180 L420,210 L380,210 Z"/>
  <line stroke="#7F8C8D" stroke-width="5" x1="400" y1="180" x2="400" y2="100" opacity="0.8"/>
  
  <!-- Vacuum lines (cleaning effect) -->
  <line stroke="#fff" stroke-width="3" x1="200" y1="350" x2="600" y2="350" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </line>
  <line stroke="#fff" stroke-width="3" x1="200" y1="380" x2="600" y2="380" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line stroke="#fff" stroke-width="3" x1="200" y1="410" x2="600" y2="410" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Sparkles -->
  <circle fill="#FFD700" cx="250" cy="320" r="8" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="550" cy="360" r="6" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#FFD700" cx="400" cy="440" r="7" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Overlay gradient -->
  <rect fill="url(#overlayGrad5)" width="800" height="600"/>
</svg>
